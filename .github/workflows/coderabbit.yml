name: CodeRabbit Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    # 모든 브랜치에 대한 PR에서 실행
  
  push:
    # 모든 브랜치에서 실행 (제외할 브랜치만 명시)
    branches-ignore:
      - 'temp/**'
      - 'experimental/**'
  
  # 수동 트리거도 허용
  workflow_dispatch:

jobs:
  coderabbit-review:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      pull-requests: write
      issues: write
      actions: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Get branch name
        id: branch-name
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "branch=${{ github.head_ref }}" >> $GITHUB_OUTPUT
          else
            echo "branch=${GITHUB_REF#refs/heads/}" >> $GITHUB_OUTPUT
          fi
      
      - name: CodeRabbit Review
        uses: coderabbitai/coderabbit-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # 브랜치별 다른 리뷰 레벨 설정
          review-level: ${{ contains(steps.branch-name.outputs.branch, 'main') && 'strict' || 'detailed' }}
          # Java 프로젝트 설정
          language: java
          # 보안 체크 활성화
          security-check: true
          # 커버리지 체크
          coverage-check: true
        env:
          CODERABBIT_API_KEY: ${{ secrets.CODERABBIT_API_KEY }}
