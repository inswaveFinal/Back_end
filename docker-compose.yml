version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: spring-security-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    networks:
      - spring-security-network

  # Redis GUI 관리 도구
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: redis-commander
    hostname: redis-commander
    ports:
      - "8081:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379
    depends_on:
      - redis
    networks:
      - spring-security-network

volumes:
  redis_data:
    driver: local

networks:
  spring-security-network:
    driver: bridge
