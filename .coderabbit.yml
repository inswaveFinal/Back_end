# CodeRabbit 설정 파일 (간단 버전)

# 리뷰 설정
reviews:
  # 모든 브랜치에서 리뷰 활성화
  review_status: true
  
  # 자동 리뷰 설정
  auto_review:
    enabled: true
    # base_branches를 제거하면 모든 브랜치에서 자동 리뷰
    drafts: true
  
  # 리뷰 요청 설정
  request_changes: ask

# 언어별 설정
language_settings:
  java:
    review_level: detailed
  
# 제외할 파일/폴더
path_filters:
  excluded:
    - "*.md"
    - "**/*.log"
    - "**/build/**"
    - "**/target/**"
    - "**/.gradle/**"
    - "**/node_modules/**"
  
# 리뷰 범위 설정
review_scope:
  changed_files_only: false
  include_context: true

# 알림 설정
notifications:
  on_review_completion: true
  on_critical_issues: true

# 보안 체크
security:
  vulnerability_check: true
  sensitive_data_check: true
